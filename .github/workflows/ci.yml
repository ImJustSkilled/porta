name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "packages/proxy/src/**"
      - "packages/proxy/package.json"
      - "packages/proxy/tsconfig.json"
      - "packages/proxy/vitest.config.ts"
      - "packages/web/src/**"
      - "packages/web/public/**"
      - "packages/web/index.html"
      - "packages/web/package.json"
      - "packages/web/e2e/**"
      - "packages/web/tsconfig*.json"
      - "packages/web/vite.config.ts"
      - "packages/web/vitest.config.ts"
      - "packages/web/vitest.e2e.config.ts"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "packages/proxy/src/**"
      - "packages/proxy/package.json"
      - "packages/proxy/tsconfig.json"
      - "packages/proxy/vitest.config.ts"
      - "packages/web/src/**"
      - "packages/web/public/**"
      - "packages/web/index.html"
      - "packages/web/package.json"
      - "packages/web/e2e/**"
      - "packages/web/tsconfig*.json"
      - "packages/web/vite.config.ts"
      - "packages/web/vitest.config.ts"
      - "packages/web/vitest.e2e.config.ts"
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run E2E
        run: pnpm test:e2e
